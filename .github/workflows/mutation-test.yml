name: Mutation Testing

on:
  pull_request:
    paths:
      - 'src/principles/**/*.ts'
      - 'stryker.conf.json'
      - 'tsconfig.stryker.json'
      - 'package.json'
      - 'vitest.config.ts'
  push:
    branches: [main]
    paths:
      - 'src/principles/**/*.ts'
      - 'stryker.conf.json'
      - 'tsconfig.stryker.json'
      - 'package.json'
      - 'vitest.config.ts'
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx stryker run
      - name: Upload Mutation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30
