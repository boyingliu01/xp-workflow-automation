specification:
  id: SPEC-API-001
  name: User Profiles API
  version: "1.0.0"
  description: RESTful API for managing user profiles with CRUD operations, pagination, and authentication
  
  requirements:
    - id: REQ-API-001
      description: GET /api/users returns paginated list of users with optional filtering and sorting
      priority: MUST
      
      acceptance_criteria:
        - id: AC-API-001-01
          given: a valid JWT authentication token with read:users scope
          when: client sends GET /api/users request
          then: system returns HTTP 200 status
          and: response contains array of user objects
          and: response includes pagination metadata
        
        - id: AC-API-001-02
          given: a valid token and query parameter page=2 limit=10
          when: client sends GET /api/users?page=2&limit=10
          then: system returns users for page 2
          and: pagination shows page 2 of N total
          and: hasNextPage indicates if more pages exist
        
        - id: AC-API-001-03
          given: a valid token and search query john
          when: client sends GET /api/users?search=john
          then: system returns filtered users matching search
          and: search applies to firstName, lastName, and email
        
        - id: AC-API-001-04
          given: missing or invalid authentication token
          when: client sends GET /api/users
          then: system returns HTTP 401 Unauthorized
          and: error code is UNAUTHORIZED
        
        - id: AC-API-001-05
          given: valid token but missing required scope
          when: client sends GET /api/users
          then: system returns HTTP 403 Forbidden
          and: error code is FORBIDDEN
      
      edge_cases:
        - Empty result set when no users match filter
        - Requested page exceeds total pages
        - Limit exceeds maximum allowed value (100)
        - Invalid sort field specified
      
      security_considerations:
        - Authentication required for all endpoints
        - Scope-based authorization (read:users, write:users, delete:users)
        - Rate limiting to prevent abuse
    
    - id: REQ-API-002
      description: POST /api/users creates a new user profile with validated input
      priority: MUST
      
      acceptance_criteria:
        - id: AC-API-002-01
          given: a valid JWT token with write:users scope and valid user data
          when: client sends POST /api/users with complete user input
          then: system creates new user
          and: returns HTTP 201 Created status
          and: response contains created user with generated ID
        
        - id: AC-API-002-02
          given: valid token and input with existing email
          when: client sends POST /api/users with duplicate email
          then: system returns HTTP 409 Conflict
          and: error code is DUPLICATE_EMAIL
          and: user is not created
        
        - id: AC-API-002-03
          given: valid token and input missing required field
          when: client sends POST /api/users without firstName
          then: system returns HTTP 400 Bad Request
          and: error code is VALIDATION_ERROR
          and: details indicate missing field
        
        - id: AC-API-002-04
          given: valid token and input with invalid email format
          when: client sends POST /api/users with malformed email
          then: system returns HTTP 400 Bad Request
          and: error indicates email format invalid
      
      edge_cases:
        - Email with trailing whitespace (trim before validation)
        - Names exceeding maximum length (100 chars)
        - Null values for optional fields
        - Password too weak (complexity requirements)
      
      security_considerations:
        - Email normalization (lowercase, trim)
        - Password hashing before storage
        - Input validation prevents injection
    
    - id: REQ-API-003
      description: PUT /api/users/:id updates an existing user profile with partial updates
      priority: MUST
      
      acceptance_criteria:
        - id: AC-API-003-01
          given: a valid JWT token with write:users scope and existing user ID
          when: client sends PUT /api/users/:id with update data
          then: system updates specified fields
          and: returns HTTP 200 OK status
          and: response contains updated user
        
        - id: AC-API-003-02
          given: valid token and non-existent user ID
          when: client sends PUT /api/users/nonexistent-id
          then: system returns HTTP 404 Not Found
          and: error code is USER_NOT_FOUND
        
        - id: AC-API-003-03
          given: valid token and attempt to change email to existing one
          when: client sends PUT with duplicate email
          then: system returns HTTP 409 Conflict
          and: error code is DUPLICATE_EMAIL
        
        - id: AC-API-003-04
          given: valid token and attempt to deactivate own account
          when: user sends PUT to deactivate their own isActive
          then: system returns HTTP 403 Forbidden
          and: error code is SELF_DEACTIVATION_FORBIDDEN
        
        - id: AC-API-003-05
          given: valid token and empty update request body
          when: client sends PUT with no changes
          then: system returns HTTP 200 OK
          and: user data unchanged
          and: updatedAt not modified
      
      edge_cases:
        - Update non-existent user
        - Partial update (only some fields)
        - Same email update (idempotent)
        - Invalid UUID format in path
      
      security_considerations:
        - Prevent self-deactivation to avoid lockout
        - Validate all input before update
        - Audit logging for sensitive changes
    
    - id: REQ-API-004
      description: DELETE /api/users/:id permanently removes a user profile
      priority: MUST
      
      acceptance_criteria:
        - id: AC-API-004-01
          given: a valid JWT token with delete:users scope and existing user ID
          when: client sends DELETE /api/users/:id
          then: system permanently deletes user
          and: returns HTTP 204 No Content
        
        - id: AC-API-004-02
          given: valid token and attempt to delete own account
          when: user sends DELETE to their own ID
          then: system returns HTTP 403 Forbidden
          and: error code is SELF_DELETION_FORBIDDEN
        
        - id: AC-API-004-03
          given: valid token and attempt to delete last admin
          when: client sends DELETE for only remaining admin
          then: system returns HTTP 403 Forbidden
          and: error code is LAST_ADMIN_FORBIDDEN
        
        - id: AC-API-004-04
          given: valid token and user with dependencies (projects, orders)
          when: client sends DELETE for user with active resources
          then: system returns HTTP 409 Conflict
          and: error code is USER_HAS_DEPENDENCIES
          and: details list blocking resources
        
        - id: AC-API-004-05
          given: valid token and non-existent user ID
          when: client sends DELETE /api/users/nonexistent-id
          then: system returns HTTP 404 Not Found
          and: error code is USER_NOT_FOUND
      
      edge_cases:
        - Delete non-existent user
        - Concurrent deletion requests
        - User with pending orders
        - Invalid UUID format
      
      security_considerations:
        - Prevent self-deletion
        - Protect last admin
        - Check dependencies before deletion
        - Audit logging for deletions
  
  design_decisions:
    - id: DD-API-001
      title: RESTful API Design
      description: Follow REST conventions with resource-oriented URLs and standard HTTP methods
      rationale: RESTful design is widely understood, follows conventions, and works well with HTTP infrastructure
      alternatives_considered:
        - GraphQL: More flexible but adds complexity
        - RPC-style: Less standard, harder to cache
      consequences:
        positive:
          - Familiar to most developers
          - Good caching support
          - Clear resource semantics
        negative:
          - May require multiple requests for complex data
    
    - id: DD-API-002
      title: JWT Authentication with Scopes
      description: Use JWT Bearer tokens for authentication with scope-based authorization
      rationale: Stateless authentication supports distributed services, scopes enable granular permissions
      alternatives_considered:
        - Session cookies: Requires session storage, less scalable
        - API keys: No expiration, harder to manage
      consequences:
        positive:
          - Stateless and scalable
          - Built-in expiration mechanism
          - Scope-based fine-grained access control
        negative:
          - Token management complexity
          - Cannot revoke without blacklist
    
    - id: DD-API-003
      title: Offset-based Pagination
      description: Offset-based pagination with configurable limit (default 20, max 100)
      rationale: Simple to implement and understand, works well for most use cases
      alternatives_considered:
        - Cursor-based: Better for large datasets and real-time data
        - No pagination: Unsuitable for large collections
      consequences:
        positive:
          - Simple implementation
          - Predictable page numbers
          - Easy navigation for users
        negative:
          - Performance issues with large offsets
          - Gaps on concurrent modifications
    
    - id: DD-API-004
      title: Structured Error Responses
      description: Consistent error structure with code, message, details, requestId, timestamp
      rationale: Structured errors enable programmatic handling, requestId aids debugging
      alternatives_considered:
        - Plain text errors: Harder to parse programmatically
        - HTTP status only: Insufficient information for debugging
      consequences:
        positive:
          - Machine-readable errors
          - Request tracing via requestId
          - Additional context in details array
        negative:
          - Slightly larger response size
    
    - id: DD-API-005
      title: Sliding Window Rate Limiting
      description: Sliding window rate limiting: 100 requests per minute for authenticated users
      rationale: Prevents abuse while allowing normal usage patterns, smoother than fixed window
      alternatives_considered:
        - Fixed window: Allows burst at boundary
        - No rate limiting: Vulnerable to abuse
      consequences:
        positive:
          - Smooth rate enforcement
          - Prevents brute force attacks
          - Fair usage distribution
        negative:
          - Additional state storage required
          - May block legitimate bursts
  
  api_contracts:
    endpoints:
      - path: /api/users
        method: GET
        summary: List all users
        authentication:
          required: true
          scopes: [read:users]
        parameters:
          query:
            - name: page
              type: integer
              default: 1
            - name: limit
              type: integer
              default: 20
              max: 100
            - name: search
              type: string
            - name: sortBy
              type: string
              enum: [createdAt, updatedAt, firstName, lastName, email]
        responses:
          200:
            schema:
              success: boolean
              data:
                items: array of User
                pagination: PaginationMeta
          401:
            code: UNAUTHORIZED
          403:
            code: FORBIDDEN
      
      - path: /api/users
        method: POST
        summary: Create new user
        authentication:
          required: true
          scopes: [write:users]
        requestBody:
          schema: UserCreateInput
          required: [email, firstName, lastName]
        responses:
          201:
            schema: User
            headers:
              Location: /api/users/{id}
          400:
            code: VALIDATION_ERROR
          409:
            code: DUPLICATE_EMAIL
      
      - path: /api/users/:id
        method: PUT
        summary: Update user
        authentication:
          required: true
          scopes: [write:users]
        parameters:
          path:
            - name: id
              type: string
              format: uuid
              required: true
        requestBody:
          schema: UserUpdateInput
        responses:
          200:
            schema: User
          404:
            code: USER_NOT_FOUND
          409:
            code: DUPLICATE_EMAIL
      
      - path: /api/users/:id
        method: DELETE
        summary: Delete user
        authentication:
          required: true
          scopes: [delete:users]
        parameters:
          path:
            - name: id
              type: string
              format: uuid
              required: true
        responses:
          204: null
          404:
            code: USER_NOT_FOUND
          403:
            code: SELF_DELETION_FORBIDDEN
  
  error_codes:
    UNAUTHORIZED:
      status: 401
    FORBIDDEN:
      status: 403
    USER_NOT_FOUND:
      status: 404
    VALIDATION_ERROR:
      status: 400
    DUPLICATE_EMAIL:
      status: 409
    SELF_DELETION_FORBIDDEN:
      status: 403
    LAST_ADMIN_FORBIDDEN:
      status: 403
    USER_HAS_DEPENDENCIES:
      status: 409
    RATE_LIMIT_EXCEEDED:
      status: 429