# User Profiles API Specification
# API Version: 1.0.0
# Last Updated: 2026-04-12

api:
  name: User Profiles API
  version: 1.0.0
  basePath: /api
  description: |
    RESTful API for managing user profiles with CRUD operations.
    Supports pagination, authentication, and comprehensive error handling.

  # Authentication
  authentication:
    type: Bearer Token (JWT)
    header: Authorization
    format: Bearer <token>
    description: |
      All endpoints require valid JWT token except where noted.
      Token must be included in Authorization header.
    errorResponses:
      401:
        code: UNAUTHORIZED
        message: Missing or invalid authentication token
      403:
        code: FORBIDDEN
        message: Insufficient permissions to access resource

  # Common Response Schemas
  commonSchemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: array
              items:
                type: string
              description: Additional error context
        timestamp:
          type: string
          format: date-time
          example: "2026-04-12T10:30:00Z"
        requestId:
          type: string
          description: Unique identifier for request tracing
          example: "req_abc123xyz"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          description: Current page number
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Items per page
          example: 20
        totalPages:
          type: integer
          description: Total number of pages
          example: 5
        totalItems:
          type: integer
          description: Total number of items
          example: 95
        hasNextPage:
          type: boolean
          description: Whether more pages exist
          example: true
        hasPrevPage:
          type: boolean
          description: Whether previous pages exist
          example: false

  # User Schema Definition
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the user
          example: "usr_a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        email:
          type: string
          format: email
          description: User's email address (unique)
          example: "john.doe@example.com"
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          description: User's first name
          example: "John"
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          description: User's last name
          example: "Doe"
        avatar:
          type: string
          format: uri
          description: URL to user's avatar image
          example: "https://cdn.example.com/avatars/usr_a1b2c3d4.jpg"
        role:
          type: string
          enum: [user, admin, moderator]
          default: user
          description: User's role in the system
          example: "user"
        isActive:
          type: boolean
          default: true
          description: Whether the user account is active
          example: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of last login
          example: "2026-04-11T14:30:00Z"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when user was created
          example: "2026-01-15T09:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of last update
          example: "2026-04-12T08:45:00Z"

    UserCreateInput:
      type: object
      required:
        - email
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: "john.doe@example.com"
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          description: User's first name
          example: "John"
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          description: User's last name
          example: "Doe"
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: User's password (will be hashed)
          example: "SecurePass123!"
        avatar:
          type: string
          format: uri
          description: URL to user's avatar image
          example: "https://cdn.example.com/avatars/default.jpg"
        role:
          type: string
          enum: [user, admin, moderator]
          default: user
          description: User's role
          example: "user"

    UserUpdateInput:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: "john.doe.new@example.com"
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          description: User's first name
          example: "Johnny"
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          description: User's last name
          example: "Doe-Smith"
        avatar:
          type: string
          format: uri
          description: URL to user's avatar image
          example: "https://cdn.example.com/avatars/updated.jpg"
        role:
          type: string
          enum: [user, admin, moderator]
          description: User's role
          example: "moderator"
        isActive:
          type: boolean
          description: Whether the user account is active
          example: true

  # Endpoints
  endpoints:

    # GET /api/users - List all users
    - method: GET
      path: /users
      summary: List all users
      description: |
        Retrieves a paginated list of users with optional filtering and sorting.
        Supports filtering by role, active status, and search by name/email.
      tags: [Users]
      authentication:
        required: true
        scopes: [read:users]

      parameters:
        query:
          - name: page
            type: integer
            default: 1
            minimum: 1
            description: Page number for pagination
            example: 1

          - name: limit
            type: integer
            default: 20
            minimum: 1
            maximum: 100
            description: Number of items per page
            example: 20

          - name: search
            type: string
            maxLength: 255
            description: Search term for filtering by name or email
            example: "john"

          - name: role
            type: string
            enum: [user, admin, moderator]
            description: Filter by user role
            example: "admin"

          - name: isActive
            type: boolean
            description: Filter by active status
            example: true

          - name: sortBy
            type: string
            enum: [createdAt, updatedAt, firstName, lastName, email]
            default: createdAt
            description: Field to sort by
            example: "createdAt"

          - name: sortOrder
            type: string
            enum: [asc, desc]
            default: desc
            description: Sort direction
            example: "desc"

      responses:
        200:
          description: Successfully retrieved list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/api/schemas/User'
                      pagination:
                        $ref: '#/api/commonSchemas/PaginationMeta'
              example:
                success: true
                data:
                  items:
                    - id: "usr_a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      email: "john.doe@example.com"
                      firstName: "John"
                      lastName: "Doe"
                      avatar: "https://cdn.example.com/avatars/usr_a1b2c3d4.jpg"
                      role: "user"
                      isActive: true
                      lastLoginAt: "2026-04-11T14:30:00Z"
                      createdAt: "2026-01-15T09:00:00Z"
                      updatedAt: "2026-04-12T08:45:00Z"
                    - id: "usr_b2c3d4e5-f6a7-8901-bcde-f23456789012"
                      email: "jane.smith@example.com"
                      firstName: "Jane"
                      lastName: "Smith"
                      role: "admin"
                      isActive: true
                      createdAt: "2026-02-20T10:30:00Z"
                      updatedAt: "2026-03-15T16:20:00Z"
                  pagination:
                    page: 1
                    limit: 20
                    totalPages: 5
                    totalItems: 95
                    hasNextPage: true
                    hasPrevPage: false

        400:
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid query parameters
                  details:
                    - "page must be a positive integer"
                    - "limit cannot exceed 100"
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_invalid_params_001"

        401:
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: Authentication token is required
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_auth_required_001"

        403:
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: FORBIDDEN
                  message: Insufficient permissions to list users
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_forbidden_001"

      # Edge Cases
      edgeCases:
        - scenario: Empty result set
          description: When no users match the filter criteria
          response:
            status: 200
            body:
              success: true
              data:
                items: []
                pagination:
                  page: 1
                  limit: 20
                  totalPages: 0
                  totalItems: 0
                  hasNextPage: false
                  hasPrevPage: false

        - scenario: Page exceeds total pages
          description: Requested page number is greater than available pages
          response:
            status: 400
            body:
              success: false
              error:
                code: INVALID_PAGE
                message: Page number exceeds available pages
                details:
                  - "Requested page 10, but only 5 pages available"

        - scenario: Large page size
          description: Requesting more than maximum allowed items per page
          response:
            status: 400
            body:
              success: false
              error:
                code: INVALID_LIMIT
                message: Limit exceeds maximum allowed value
                details:
                  - "Maximum limit is 100, requested 200"

        - scenario: Invalid sort field
          description: Sort field not in allowed enum
          response:
            status: 400
            body:
              success: false
              error:
                code: INVALID_SORT_FIELD
                message: Invalid sort field
                details:
                  - "Field 'middleName' is not a valid sort field"

    # POST /api/users - Create new user
    - method: POST
      path: /users
      summary: Create new user
      description: |
        Creates a new user profile. Email must be unique.
        Returns the created user object with generated ID.
      tags: [Users]
      authentication:
        required: true
        scopes: [write:users]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/api/schemas/UserCreateInput'
        example:
          email: "new.user@example.com"
          firstName: "New"
          lastName: "User"
          password: "SecurePass123!"
          role: "user"

      responses:
        201:
          description: User created successfully
          headers:
            Location:
              description: URL of the newly created user
              schema:
                type: string
                example: "/api/users/usr_new123"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/api/schemas/User'
                  message:
                    type: string
                    example: "User created successfully"
              example:
                success: true
                data:
                  id: "usr_new123-4567-8901-abcd-ef1234567890"
                  email: "new.user@example.com"
                  firstName: "New"
                  lastName: "User"
                  avatar: null
                  role: "user"
                  isActive: true
                  lastLoginAt: null
                  createdAt: "2026-04-12T10:30:00Z"
                  updatedAt: "2026-04-12T10:30:00Z"
                message: "User created successfully"

        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              examples:
                missingRequired:
                  summary: Missing required field
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: Missing required field
                      details:
                        - "Field 'email' is required"
                    timestamp: "2026-04-12T10:30:00Z"
                    requestId: "req_validation_001"
                invalidEmail:
                  summary: Invalid email format
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: Invalid email format
                      details:
                        - "Field 'email' must be a valid email address"
                    timestamp: "2026-04-12T10:30:00Z"
                    requestId: "req_validation_002"
                weakPassword:
                  summary: Password too weak
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: Password does not meet requirements
                      details:
                        - "Password must be at least 8 characters"
                        - "Password must contain at least one uppercase letter"
                        - "Password must contain at least one number"
                    timestamp: "2026-04-12T10:30:00Z"
                    requestId: "req_validation_003"

        409:
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: DUPLICATE_EMAIL
                  message: Email address already registered
                  details:
                    - "Email 'john.doe@example.com' is already in use"
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_duplicate_001"

        401:
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'

        403:
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'

      # Edge Cases
      edgeCases:
        - scenario: Duplicate email
          description: Attempting to create user with existing email
          response:
            status: 409
            body:
              success: false
              error:
                code: DUPLICATE_EMAIL
                message: Email address already registered

        - scenario: Email with trailing spaces
          description: Email with leading/trailing whitespace
          behavior: Trim whitespace before validation and storage
          response:
            status: 201
            note: "Email stored without trailing spaces"

        - scenario: Very long names
          description: Names exceeding maximum length
          response:
            status: 400
            body:
              success: false
              error:
                code: VALIDATION_ERROR
                message: Field exceeds maximum length
                details:
                  - "firstName must not exceed 100 characters"

        - scenario: Null optional fields
          description: Optional fields explicitly set to null
          behavior: Store null values for optional fields
          response:
            status: 201
            note: "Optional fields stored as null"

    # PUT /api/users/:id - Update user
    - method: PUT
      path: /users/:id
      summary: Update user
      description: |
        Updates an existing user profile. All fields are optional.
        Only provided fields will be updated (partial update).
      tags: [Users]
      authentication:
        required: true
        scopes: [write:users]

      parameters:
        path:
          - name: id
            type: string
            format: uuid
            required: true
            description: Unique identifier of the user to update
            example: "usr_a1b2c3d4-e5f6-7890-abcd-ef1234567890"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/api/schemas/UserUpdateInput'
        example:
          firstName: "Johnny"
          lastName: "Updated"
          role: "moderator"

      responses:
        200:
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/api/schemas/User'
                  message:
                    type: string
                    example: "User updated successfully"
              example:
                success: true
                data:
                  id: "usr_a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  email: "john.doe@example.com"
                  firstName: "Johnny"
                  lastName: "Updated"
                  avatar: "https://cdn.example.com/avatars/usr_a1b2c3d4.jpg"
                  role: "moderator"
                  isActive: true
                  lastLoginAt: "2026-04-11T14:30:00Z"
                  createdAt: "2026-01-15T09:00:00Z"
                  updatedAt: "2026-04-12T10:45:00Z"
                message: "User updated successfully"

        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              examples:
                invalidUUID:
                  summary: Invalid user ID format
                  value:
                    success: false
                    error:
                      code: INVALID_ID
                      message: Invalid user ID format
                      details:
                        - "ID must be a valid UUID"
                    timestamp: "2026-04-12T10:30:00Z"
                    requestId: "req_invalid_id_001"
                invalidEmail:
                  summary: Invalid email format in update
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: Invalid email format
                      details:
                        - "Field 'email' must be a valid email address"
                    timestamp: "2026-04-12T10:30:00Z"
                    requestId: "req_validation_004"

        404:
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: USER_NOT_FOUND
                  message: User not found
                  details:
                    - "No user found with ID 'usr_nonexistent123'"
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_not_found_001"

        409:
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: DUPLICATE_EMAIL
                  message: Email address already in use
                  details:
                    - "Email 'jane.smith@example.com' is already registered by another user"
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_duplicate_002"

        401:
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'

        403:
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'

      # Edge Cases
      edgeCases:
        - scenario: Update non-existent user
          description: Attempting to update a user that doesn't exist
          response:
            status: 404
            body:
              success: false
              error:
                code: USER_NOT_FOUND
                message: User not found

        - scenario: No changes provided
          description: Request body is empty or contains only null values
          behavior: Return current user without modification
          response:
            status: 200
            note: "User returned unchanged, updatedAt not modified"

        - scenario: Update to duplicate email
          description: Changing email to one already used by another user
          response:
            status: 409
            body:
              success: false
              error:
                code: DUPLICATE_EMAIL
                message: Email address already in use

        - scenario: Same email update
          description: Updating with the same email the user already has
          behavior: Accept and return success (idempotent)
          response:
            status: 200
            note: "No conflict since it's the same user's email"

        - scenario: Partial update
          description: Only updating some fields
          behavior: Only specified fields are modified
          response:
            status: 200
            note: "Only firstName updated, all other fields unchanged"

        - scenario: Deactivate own account
          description: User attempting to deactivate their own account
          behavior: Block to prevent self-lockout
          response:
            status: 403
            body:
              success: false
              error:
                code: SELF_DEACTIVATION_FORBIDDEN
                message: Cannot deactivate your own account

    # DELETE /api/users/:id - Delete user
    - method: DELETE
      path: /users/:id
      summary: Delete user
      description: |
        Permanently deletes a user and associated data.
        This action cannot be undone.
      tags: [Users]
      authentication:
        required: true
        scopes: [delete:users]

      parameters:
        path:
          - name: id
            type: string
            format: uuid
            required: true
            description: Unique identifier of the user to delete
            example: "usr_a1b2c3d4-e5f6-7890-abcd-ef1234567890"

      responses:
        204:
          description: User deleted successfully (no content)
          note: Response body is empty for 204 status

        400:
          description: Invalid user ID format
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: INVALID_ID
                  message: Invalid user ID format
                  details:
                    - "ID must be a valid UUID"
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_invalid_id_002"

        404:
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: USER_NOT_FOUND
                  message: User not found
                  details:
                    - "No user found with ID 'usr_nonexistent123'"
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_not_found_002"

        403:
          description: Cannot delete own account or admin restriction
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              examples:
                selfDeletion:
                  summary: Cannot delete own account
                  value:
                    success: false
                    error:
                      code: SELF_DELETION_FORBIDDEN
                      message: Cannot delete your own account
                    timestamp: "2026-04-12T10:30:00Z"
                    requestId: "req_self_delete_001"
                lastAdmin:
                  summary: Cannot delete last admin
                  value:
                    success: false
                    error:
                      code: LAST_ADMIN_FORBIDDEN
                      message: Cannot delete the last admin user
                    timestamp: "2026-04-12T10:30:00Z"
                    requestId: "req_last_admin_001"

        401:
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'

        409:
          description: User has active dependencies
          content:
            application/json:
              schema:
                $ref: '#/api/commonSchemas/ErrorResponse'
              example:
                success: false
                error:
                  code: USER_HAS_DEPENDENCIES
                  message: Cannot delete user with active resources
                  details:
                    - "User owns 3 projects that must be transferred or deleted first"
                    - "User has 5 pending orders"
                timestamp: "2026-04-12T10:30:00Z"
                requestId: "req_dependencies_001"

      # Edge Cases
      edgeCases:
        - scenario: Delete non-existent user
          description: Attempting to delete a user that doesn't exist
          response:
            status: 404
            body:
              success: false
              error:
                code: USER_NOT_FOUND
                message: User not found

        - scenario: Delete own account
          description: User attempting to delete their own account
          response:
            status: 403
            body:
              success: false
              error:
                code: SELF_DELETION_FORBIDDEN
                message: Cannot delete your own account

        - scenario: Delete last admin
          description: Attempting to delete the only remaining admin
          response:
            status: 403
            body:
              success: false
              error:
                code: LAST_ADMIN_FORBIDDEN
                message: Cannot delete the last admin user

        - scenario: User with dependencies
          description: User has related resources (projects, orders, etc.)
          response:
            status: 409
            body:
              success: false
              error:
                code: USER_HAS_DEPENDENCIES
                message: Cannot delete user with active resources

        - scenario: Concurrent deletion
          description: Another request deleted the user between lookup and deletion
          response:
            status: 404
            body:
              success: false
              error:
                code: USER_NOT_FOUND
                message: User not found (may have been recently deleted)

  # Rate Limiting
  rateLimiting:
    enabled: true
    strategy: sliding window
    limits:
      - scope: global
        requests: 1000
        window: 1h
      - scope: authenticated
        requests: 100
        window: 1m
      - scope: endpoint
        path: /api/users
        method: POST
        requests: 10
        window: 1m
    headers:
      - X-RateLimit-Limit
      - X-RateLimit-Remaining
      - X-RateLimit-Reset
    exceededResponse:
      status: 429
      body:
        success: false
        error:
          code: RATE_LIMIT_EXCEEDED
          message: Rate limit exceeded
          details:
            - "Limit: 100 requests per minute"
            - "Retry after: 45 seconds"
        retryAfter: 45

  # Pagination Strategy
  pagination:
    strategy: offset-based
    defaultLimit: 20
    maxLimit: 100
    supportedParameters:
      - page
      - limit
      - cursor (alternative strategy)
    cursorPagination:
      enabled: true
      cursorHeader: X-Next-Cursor
      description: Alternative cursor-based pagination for large datasets

  # Error Codes Reference
  errorCodes:
    UNAUTHORIZED:
      status: 401
      description: Missing or invalid authentication
    FORBIDDEN:
      status: 403
      description: Insufficient permissions
    USER_NOT_FOUND:
      status: 404
      description: User does not exist
    VALIDATION_ERROR:
      status: 400
      description: Request validation failed
    DUPLICATE_EMAIL:
      status: 409
      description: Email already registered
    INVALID_ID:
      status: 400
      description: Invalid identifier format
    SELF_DELETION_FORBIDDEN:
      status: 403
      description: Cannot delete own account
    SELF_DEACTIVATION_FORBIDDEN:
      status: 403
      description: Cannot deactivate own account
    LAST_ADMIN_FORBIDDEN:
      status: 403
      description: Cannot delete last admin
    USER_HAS_DEPENDENCIES:
      status: 409
      description: User has unhandled dependencies
    RATE_LIMIT_EXCEEDED:
      status: 429
      description: Too many requests

  # Security Considerations
  security:
    authentication:
      - JWT tokens with 24h expiration
      - Refresh token rotation
      - Secure token storage (HttpOnly cookies recommended)
    authorization:
      - Role-based access control (RBAC)
      - Scope-based permissions
      - Resource ownership checks
    inputValidation:
      - SQL injection prevention (parameterized queries)
      - XSS prevention (output encoding)
      - Email normalization (lowercase, trim)
      - Password requirements enforcement
    dataProtection:
      - PII encryption at rest
      - HTTPS/TLS 1.3 for all communications
      - Rate limiting to prevent abuse
      - Audit logging for sensitive operations

  # Versioning
  versioning:
    strategy: url-path
    current: v1
    supported: [v1]
    deprecated: []
    sunset: []
